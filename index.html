<!DOCTYPE html>
<html lang="es">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        html { font-family: 'Inter', sans-serif; }
        body {
            position: relative;
            height: 100vh;
            overflow: hidden;
        }
        #background-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
        }
        .profile-card-wrapper {
            position: relative;
            z-index: 10;

            justify-content: center;

</head>
<body class="bg-black text-white p-4">

                >

            <h1 class="text-3xl font-extrabold mb-2 tracking-wide text-center">

            <p class="text-lg text-gray-300 mb-10 font-medium text-center">
                Game Developer

            <div class="space-y-4">
                
                <a href="https://www.linkedin.com/in/jeruko/" target="_blank" rel="noopener noreferrer" 
                    class="flex items-center p-3 rounded-lg bg-blue-700 hover:bg-blue-600 transition-colors shadow-md">
                    <span class="text-white w-8 flex-shrink-0 text-xl text-center">
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M19 0h-14c-2.761 0-5 2.239-5 5v14c0 2.761 2.239 5 5 5h14c2.762 0 5-2.239 5-5v-14c0-2.761-2.238-5-5-5zm-11 19h-3v-11h3v11zm-1.5-12.268c-.966 0-1.75-.79-1.75-1.764s.784-1.764 1.75-1.764 1.75.79 1.75 1.764-.783 1.764-1.75 1.764zm13.5 12.268h-3v-5.604c0-3.368-4-3.518-4 0v5.604h-3v-11h3v1.765c1.396-2.586 7-2.777 7 2.476v6.759z"/></svg>
                    </span>

                <a href="https://github.com/Jeruko10" target="_blank" rel="noopener noreferrer" 
                    class="flex items-center p-3 rounded-lg bg-gray-900 hover:bg-black transition-colors shadow-md">
                    <span class="text-white w-8 flex-shrink-0 text-xl text-center">
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.082-.778.08-.766.08-.766 1.203.086 1.838 1.238 1.838 1.238 1.07 1.835 2.809 1.305 3.492.998.108-.778.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.468-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.045.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.652.242 2.873.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.2-6.088 8.2-11.386 0-6.627-5.373-12-12-12z"/></svg>

            </div>
        </div>
    </div>

    <script>
        function setupBackground() {
            const container = document.getElementById('background-container');
            const width = window.innerWidth;
            const height = window.innerHeight;

            const scene = new THREE.Scene();
            const camera = new THREE.OrthographicCamera(-1, 1, 1, -1, 0.1, 10);
            camera.position.z = 1;

            const renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(width, height);
            container.appendChild(renderer.domElement);

            const vertexShader = `
                void main() {
                    gl_Position = vec4(position, 1.0);
                }
            `;

            const fragmentShader = `
                uniform float u_time;
                uniform vec2 u_resolution;

                float hash21(vec2 p) {
                    p = fract(p * vec2(123.45, 678.90));
                    p += dot(p, p.yx + 19.19);
                    return fract(p.x * p.y);
                }

                void main() {
                    vec2 uv = gl_FragCoord.xy / u_resolution.xy;
                    
                    vec2 p = uv * 30.0; 
                    
                    p.y += u_time * 0.7; 

                    vec2 i = floor(p);
                    vec2 f = fract(p);

                    float r = hash21(i);
                    
                    float offset_x = r * 0.6;
                    
                    float duration = hash21(i * 1.3) * 0.8 + 0.2;

                    float line_center = offset_x + 0.2; 
                    
                    float rain_streak = smoothstep(0.02, 0.0, abs(f.x - line_center));
                    
                    float fall_fade = smoothstep(duration, duration + 0.2, f.y);
                    
                    float final_rain = rain_streak * (1.0 - fall_fade);
                    
                    vec3 baseColor = vec3(0.08, 0.08, 0.08);
                    vec3 rainColor = vec3(0.9, 0.9, 0.9);

                    vec3 finalColor = mix(baseColor, rainColor, final_rain * 1.5);

                    gl_FragColor = vec4(finalColor, 1.0);
                }
            `;

            const uniforms = {
                u_time: { type: 'f', value: 0.0 },
                u_resolution: { type: 'v2', value: new THREE.Vector2(width, height) }
            };

            const material = new THREE.ShaderMaterial({
                uniforms: uniforms,
                vertexShader: vertexShader,
                fragmentShader: fragmentShader,
                transparent: false
            });

            const geometry = new THREE.PlaneGeometry(2, 2);
            const mesh = new THREE.Mesh(geometry, material);
            scene.add(mesh);

            const startTime = Date.now();
            function animate() {
                requestAnimationFrame(animate);

                const elapsedTime = (Date.now() - startTime) / 1000;
                uniforms.u_time.value = elapsedTime;

                renderer.render(scene, camera);
            }
            
            function onWindowResize() {
                const newWidth = window.innerWidth;
                const newHeight = window.innerHeight;

                renderer.setSize(newWidth, newHeight);
                uniforms.u_resolution.value.set(newWidth, newHeight);
            }

            window.addEventListener('resize', onWindowResize, false);
            animate();
        }

        window.onload = function () {
            setupBackground();
        }
    </script>

</body>
</html>
